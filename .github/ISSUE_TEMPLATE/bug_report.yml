name: 🐛 버그 리포트
description: 재현 가능한 버그를 신고합니다
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        버그 신고에 감사드립니다. 재현 환경과 단계를 최대한 자세히 적어주세요.

  - type: textarea
    id: summary
    attributes:
      label: 요약
      description: 한 줄 요약
      placeholder: 센서 이상치 감지 후 토스트가 두 번 뜹니다
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 재현 단계
      description: 1-2-3 스텝으로 적어주세요
      placeholder: |
        1. 데모 계정 로그인
        2. 센서 시뮬레이터로 soil_moisture=10 전송
        3. 화면 우측 상단 확인
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 기대 동작
      placeholder: 토스트가 한 번만 표시되어야 함
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 실제 동작
      placeholder: 토스트가 두 번 쌓임
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: 영역
      multiple: true
      options:
        - Backend API
        - Frontend (대시보드)
        - ESP32 펌웨어
        - 시뮬레이터
        - 결제
        - 알림 (이메일/푸시/카카오)
        - 기타
    validations:
      required: true

  - type: input
    id: env
    attributes:
      label: 환경
      placeholder: "OS, 브라우저, Node 버전 등"

  - type: textarea
    id: logs
    attributes:
      label: 로그 / 스크린샷
      render: shell
