name: ✨ 기능 제안
description: 새 기능 또는 개선 제안
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 해결하고자 하는 문제
      placeholder: 예) 야간에 급격한 온도 하락 시 알림이 느림
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 제안
      placeholder: 예) 1분 내 2도 이상 하락 시 critical 알림 발동
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 대안
      description: 고려한 다른 방법

  - type: dropdown
    id: priority
    attributes:
      label: 우선순위
      options:
        - 낮음 (편의)
        - 중간 (가치)
        - 높음 (차단)
